<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image to Illustrator Script Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; display: flex; justify-content: center; padding: 40px; }
        .container { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: #ff9d00; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 25px; }
        .upload-area { border: 2px dashed #555; padding: 40px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: #ff9d00; background: #363636; }
        #canvas-preview { max-width: 100%; margin-top: 20px; border-radius: 4px; display: none; }
        .controls { margin-top: 20px; display: none; }
        button { background: #ff9d00; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; margin-top: 15px; }
        button:hover { background: #ffb74d; }
        .status { margin-top: 15px; font-size: 0.9em; color: #4caf50; }
    </style>
</head>
<body>

<div class="container">
    <h1>VectorScript AI</h1>
    <p>Convert any image into an Adobe Illustrator (.jsx) Script</p>

    <div class="upload-area" id="drop-zone">
        <p id="upload-text">Click or Drop Image Here</p>
        <input type="file" id="file-input" hidden accept="image/*">
        <canvas id="canvas-preview"></canvas>
    </div>

    <div class="controls" id="controls">
        <label>Detail Level (Pixel Skip): </label>
        <input type="range" id="precision" min="2" max="20" value="5">
        <br>
        <button id="generate-btn">Generate Illustrator Script</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const canvas = document.getElementById('canvas-preview');
    const ctx = canvas.getContext('2d');
    const controls = document.getElementById('controls');
    const status = document.getElementById('status');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Scale down for performance if needed
                    const scale = Math.min(500 / img.width, 500 / img.height, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.style.display = 'block';
                    document.getElementById('upload-text').style.display = 'none';
                    controls.style.display = 'block';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('generate-btn').onclick = () => {
        const precision = parseInt(document.getElementById('precision').value);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        
        status.innerText = "Processing pixels...";

        let scriptContent = `// Adobe Illustrator Script Generated by VectorScript AI\n`;
        scriptContent += `var doc = app.documents.add(DocumentColorSpace.RGB, ${canvas.width}, ${canvas.height});\n`;
        scriptContent += `var layer = doc.activeLayer;\n\n`;

        // Loop through pixels and create rects for non-transparent areas
        // This simulates a "mosaic" vectorization
        for (let y = 0; y < canvas.height; y += precision) {
            for (let x = 0; x < canvas.width; x += precision) {
                const index = (y * canvas.width + x) * 4;
                const r = imageData[index];
                const g = imageData[index + 1];
                const b = imageData[index + 2];
                const a = imageData[index + 3];

                if (a > 10) { // Only draw if not transparent
                    scriptContent += `
                    var p = layer.pathItems.rectangle(${-y}, ${x}, ${precision}, ${precision});
                    var fill = new RGBColor();
                    fill.red = ${r}; fill.green = ${g}; fill.blue = ${b};
                    p.fillColor = fill;
                    p.stroked = false;`;
                }
            }
        }

        downloadScript(scriptContent);
    };

    function downloadScript(content) {
        const blob = new Blob([content], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'recreate_image.jsx';
        a.click();
        status.innerText = "Script Downloaded! Run in Illustrator via File > Scripts.";
    }
</script>

</body>
</html>
